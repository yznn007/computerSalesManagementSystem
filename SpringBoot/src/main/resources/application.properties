spring.application.name=SpringBoot

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/computer_sales_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# Jackson: 输出下划线 key，匹配前端 (product_id, order_no ...)
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT
app.jwt.secret=Y29tcHV0ZXItc2FsZXMtc2VjcmV0LWtleS1wbGVhc2UtY2hhbmdlLWluLXByb2R1Y3Rpb24=
app.jwt.expire-hours=24

# 服务端口
server.port=8080
